<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Vacaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #e2e0da;
            --text: #1a1916;
            --muted: #8a8880;
            --muted2: #b5b3ae;
            --accent: #2d5a4e;
            --accent-h: #234840;
            --error: #9b3a3a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            color: var(--accent);
            letter-spacing: -0.01em;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .btn-sm {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.4rem 0.9rem;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }

        .btn-outline {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
        }

        .btn-outline:hover {
            border-color: var(--error);
            color: var(--error);
        }

        .btn-accent {
            background: var(--accent);
            border: 1px solid var(--accent);
            color: #fff;
        }

        .btn-accent:hover {
            background: var(--accent-h);
            border-color: var(--accent-h);
        }

        main {
            max-width: 1000px;
            margin: 2.5rem auto;
            padding: 0 2rem;
            display: grid;
            gap: 2.5rem;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted2);
            margin-bottom: 1rem;
        }

        .filter-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .filter-input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            padding: 0.55rem 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .filter-input:focus {
            border-color: var(--accent);
        }

        .btn-filter {
            background: var(--surface);
            color: var(--accent);
            border: 1px solid var(--border);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.72rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.55rem 1.1rem;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-filter:hover {
            border-color: var(--accent);
        }

        .table-wrapper {
            border: 1px solid var(--border);
            background: var(--surface);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }

        thead th {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            padding: 0.7rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
        }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.12s;
        }

        tbody tr:last-child {
            border-bottom: none;
        }

        tbody tr:hover {
            background: #faf9f7;
        }

        tbody td {
            padding: 0.75rem 1rem;
        }

        tbody td:first-child {
            font-size: 0.8rem;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
        }

        .td-acciones {
            display: flex;
            gap: 0.4rem;
        }

        .btn-accion {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.3rem 0.65rem;
            border: 1px solid var(--border);
            background: none;
            color: var(--muted);
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s;
        }

        .btn-accion:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .empty-row td {
            text-align: center;
            color: var(--muted2);
            font-size: 0.85rem;
            padding: 2.5rem;
            font-style: italic;
        }

        .upload-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 1.5rem;
        }

        .upload-row {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type=file] {
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            flex: 1;
        }

        .btn-upload {
            background: var(--accent);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.6rem 1.25rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.15s;
        }

        .btn-upload:hover {
            background: var(--accent-h);
        }

        .htmx-indicator {
            display: none;
            font-size: 0.78rem;
            color: var(--muted);
            font-style: italic;
        }

        .htmx-request .htmx-indicator {
            display: inline;
        }

        #resultado-xml {
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        /* Modal */
        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-backdrop.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2rem 2rem 1.75rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
        }

        .modal-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 1.5rem;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-bottom: 1rem;
        }

        .form-field label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .form-field input,
        .form-field select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            padding: 0.6rem 0.75rem;
            outline: none;
            width: 100%;
            transition: border-color 0.15s;
        }

        .form-field input:focus,
        .form-field select:focus {
            border-color: var(--accent);
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
            margin-top: 1.25rem;
        }

        .btn-cancel {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.55rem 1rem;
            cursor: pointer;
        }

        .btn-cancel:hover {
            border-color: var(--muted);
        }

        .btn-save {
            background: var(--accent);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.55rem 1.25rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-save:hover {
            background: var(--accent-h);
        }

        #msg-insertar {
            font-size: 0.82rem;
            min-height: 1.2rem;
            margin-top: 0.5rem;
        }
    </style>
</head>

<body>
    <header>
        <span class="header-brand">Vacaciones</span>
        <div class="header-actions">
            <button class="btn-sm btn-accent" onclick="abrirModalInsertar()">+ Nuevo empleado</button>
            <form method="POST" action="/logout" style="display:inline">
                <button class="btn-sm btn-outline" type="submit">Cerrar sesión</button>
            </form>
        </div>
    </header>

    <main>
        <section>
            <div class="section-label">Empleados</div>
            <div class="filter-row">
                <input class="filter-input" type="text" id="filtro" name="filtro"
                    placeholder="Buscar por nombre o cédula..." hx-get="/api/empleados"
                    hx-trigger="keyup changed delay:400ms" hx-target="#tabla-body" hx-include="#filtro" />
                <button class="btn-filter" hx-get="/api/empleados" hx-target="#tabla-body"
                    hx-include="#filtro">Filtrar</button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Cédula</th>
                            <th>Nombre</th>
                            <th>Puesto</th>
                            <th>Saldo vacaciones</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body" hx-get="/api/empleados" hx-trigger="load, empleadosActualizado from:body">
                        <tr class="empty-row">
                            <td colspan="5">Cargando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <section>
            <div class="section-label">Importar datos</div>
            <div class="upload-card">
                <form hx-post="/cargar-xml" hx-encoding="multipart/form-data" hx-target="#resultado-xml"
                    hx-indicator=".htmx-indicator"
                    hx-on::after-request="if(event.detail.successful) htmx.trigger('#tabla-body', 'empleadosActualizado')">
                    <div class="upload-row">
                        <input type="file" name="archivo_xml" accept=".xml" required />
                        <button class="btn-upload" type="submit">Importar XML</button>
                        <span class="htmx-indicator">Procesando...</span>
                    </div>
                </form>
                <div id="resultado-xml"></div>
            </div>
        </section>
    </main>

    <!-- insertar empleado -->
    <div class="modal-backdrop" id="modal-insertar">
        <div class="modal">
            <div class="modal-title">Nuevo empleado</div>
            <form hx-post="/api/empleados" hx-target="#msg-insertar"
                hx-on::after-request="if(event.detail.successful && document.querySelector('#msg-insertar span[style*=2d5a4e]')) this.reset()">
                <div class="form-field">
                    <label>Cédula</label>
                    <input type="text" name="cedula" required pattern="\d+" title="Solo números" />
                </div>
                <div class="form-field">
                    <label>Nombre</label>
                    <input type="text" name="nombre" required />
                </div>
                <div class="form-field">
                    <label>Puesto</label>
                    <select name="id_puesto" required hx-get="/api/puestos" hx-trigger="load" hx-target="this">
                        <option value="">Cargando...</option>
                    </select>
                </div>
                <div class="form-field">
                    <label>Fecha de contratación</label>
                    <input type="date" name="fecha_contratacion" required />
                </div>
                <div id="msg-insertar"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" onclick="cerrarModalInsertar()">Cancelar</button>
                    <button type="submit" class="btn-save">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function abrirModalInsertar() {
            document.getElementById('modal-insertar').classList.add('open');
        }
        function cerrarModalInsertar() {
            document.getElementById('modal-insertar').classList.remove('open');
            document.getElementById('msg-insertar').innerHTML = '';
        }
        document.getElementById('modal-insertar').addEventListener('click', function (e) {
            if (e.target === this) cerrarModalInsertar();
        });
    </script>
</body>

</html>
