<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carga Inicial — Control de Vacaciones</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --border: #2a2a2a;
            --accent: #00d4ff;
            --text: #e8e8e8;
            --muted: #666;
            --error: #f87171;
            --success: #4ade80;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        h1 {
            font-family: monospace;
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input[type=file] {
            color: var(--text);
            font-size: 0.85rem;
        }

        button[type=submit] {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.75rem;
            cursor: pointer;
            margin-top: 0.25rem;
        }

        button[type=submit]:hover {
            opacity: 0.85;
        }

        .htmx-indicator {
            display: none;
            color: var(--muted);
            font-size: 0.8rem;
            font-style: italic;
            margin-top: 0.75rem;
            text-align: center;
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        #resultado {
            margin-top: 1.25rem;
            font-size: 0.85rem;
        }

        .back-link {
            position: absolute;
            top: 1rem;
            left: 1rem;
            font-size: 0.65rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-bottom: 1px solid transparent;
        }

        .back-link:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="card">
        <a class="back-link" href="/login">← Volver</a>

        <h1>Carga Inicial</h1>
        <p class="subtitle">Cargá el archivo XML con los datos de prueba del profesor.</p>

        <form hx-post="/cargar-xml" hx-encoding="multipart/form-data" hx-target="#resultado"
            hx-indicator=".htmx-indicator">
            <div class="field">
                <label>Archivo XML</label>
                <input type="file" name="archivo_xml" accept=".xml" required />
            </div>
            <button type="submit">Cargar datos</button>
            <div class="htmx-indicator">Procesando en SQL Server...</div>
        </form>

        <div id="resultado"></div>
    </div>
</body>

</html>
