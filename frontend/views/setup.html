<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carga de datos — Gestión de Vacaciones</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
        rel="stylesheet" />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #f5f4f0;
            --surface: #ffffff;
            --border: #e2e0da;
            --text: #1a1916;
            --muted: #8a8880;
            --accent: #2d5a4e;
            --accent-h: #234840;
            --success: #1e4d3a;
            --error: #6b2020;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 420px;
            padding: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 3rem 2.5rem 2.75rem;
            box-shadow: 0 2px 24px rgba(0, 0, 0, 0.06);
        }

        .brand {
            font-family: 'DM Serif Display', serif;
            font-size: 1.7rem;
            color: var(--accent);
            margin-bottom: 0.2rem;
            letter-spacing: -0.01em;
        }

        .tagline {
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 300;
            margin-bottom: 2.5rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input[type=file] {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            color: var(--muted);
            width: 100%;
        }

        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            padding: 0.75rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn-primary:hover {
            background: var(--accent-h);
        }

        .htmx-indicator {
            display: none;
            font-size: 0.78rem;
            color: var(--muted);
            font-style: italic;
            margin-top: 0.75rem;
        }

        .htmx-request .htmx-indicator {
            display: block;
        }

        #resultado {
            margin-top: 1rem;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .corner-link {
            position: absolute;
            bottom: 1.6rem;
            left: 1rem;
            font-size: 0.68rem;
            color: var(--muted);
            text-decoration: none;
            letter-spacing: 0.04em;
            border-bottom: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
        }

        .corner-link:hover {
            color: var(--accent);
            border-color: var(--accent);
        }
    </style>
</head>

<body>
    <div class="wrapper">
        <div class="card">
            <div class="brand">Carga de datos</div>
            <div class="tagline">Adjunta XML con los datos a cargar en el sistema.</div>

            <form hx-post="/cargar-xml" hx-encoding="multipart/form-data" hx-target="#resultado"
                hx-indicator=".htmx-indicator">
                <div class="field">
                    <label>Archivo XML</label>
                    <input type="file" name="archivo_xml" accept=".xml" required />
                </div>
                <button class="btn-primary" type="submit">Cargar datos</button>
                <div class="htmx-indicator">Procesando</div>
            </form>

            <div id="resultado"></div>
        </div>
        <a class="corner-link" href="/login"> Volver a Login</a>
    </div>
</body>

</html>
