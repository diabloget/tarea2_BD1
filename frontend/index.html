<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Control de Vacaciones</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg: #0e0e0e;
            --surface: #161616;
            --border: #2a2a2a;
            --accent: #00d4ff;
            --text: #e8e8e8;
            --muted: #666;
            --error: #f87171;
            --mono: 'IBM Plex Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
        }

        h1 {
            font-family: var(--mono);
            font-size: 1rem;
            color: var(--accent);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            margin-bottom: 1rem;
        }

        label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        input {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 0.9rem;
            padding: 0.6rem 0.75rem;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus {
            border-color: var(--accent);
        }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.75rem;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-top: 0.5rem;
        }

        button:hover {
            opacity: 0.85;
        }

        .error-msg {
            background: #2a1515;
            border: 1px solid #7f1d1d;
            color: var(--error);
            padding: 0.75rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Control de Vacaciones</h1>
        <p class="subtitle">Bases de Datos I</p>

        <!-- El error se inyecta al fallar el login -->
        <div id="error-container">
            <!-- HTMX aqui entra el codigo cuando el error cae -->
        </div>

        <form method="POST" action="/login">
            <div class="field">
                <label>Usuario</label>
                <input type="text" name="username" required autofocus />
            </div>
            <div class="field">
                <label>Contraseña</label>
                <input type="password" name="password" required />
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </div>
</body>

</html>
